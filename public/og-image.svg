<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Radio wave rings (decorative, right side) -->
  <g fill="none" stroke="#8b5cf6" opacity="0.12">
    <circle cx="1050" cy="315" r="80"  stroke-width="2"/>
    <circle cx="1050" cy="315" r="140" stroke-width="2"/>
    <circle cx="1050" cy="315" r="200" stroke-width="2"/>
    <circle cx="1050" cy="315" r="260" stroke-width="2"/>
    <circle cx="1050" cy="315" r="320" stroke-width="2"/>
  </g>

  <!-- Antenna dot -->
  <circle cx="1050" cy="315" r="10" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="1050" cy="315" r="4"  fill="#8b5cf6"/>

  <!-- App icon box -->
  <rect x="100" y="215" width="160" height="160" rx="28" fill="#1e293b"/>
  <text x="180" y="320" text-anchor="middle"
        font-family="system-ui, -apple-system, Arial, Helvetica, sans-serif"
        font-weight="900" font-size="72" fill="#8b5cf6">QSO</text>

  <!-- Headline -->
  <text x="296" y="298"
        font-family="system-ui, -apple-system, Arial, Helvetica, sans-serif"
        font-weight="700" font-size="80" fill="#f1f5f9" letter-spacing="-1">QSOlog</text>

  <!-- Subline -->
  <text x="296" y="358"
        font-family="system-ui, -apple-system, Arial, Helvetica, sans-serif"
        font-weight="400" font-size="32" fill="#94a3b8">Offline-first logbook for amateur radio operators</text>

  <!-- Bottom accent bar -->
  <rect x="100" y="440" width="700" height="3" rx="2" fill="#8b5cf6" opacity="0.5"/>

  <!-- URL -->
  <text x="100" y="490"
        font-family="system-ui, -apple-system, Arial, Helvetica, sans-serif"
        font-weight="400" font-size="24" fill="#475569">nuetzliches.github.io/qso-log</text>
</svg>
